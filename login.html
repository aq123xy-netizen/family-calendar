<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Family Calendar | Login</title>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  >
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  >
  <link rel="stylesheet" href="assets/css/styles.css?v=20260504">
</head>
<body class="login-page">
  <main class="login-shell">
    <section class="panel-card login-card p-4 p-lg-5">
      <div class="login-brand mb-4">
        <span class="site-brand-mark"><i class="bi bi-house-heart-fill"></i></span>
        <div>
          <h1 class="h2 mb-1">Family Calendar</h1>
          <p class="text-secondary mb-0">Private access for your shared family dashboard.</p>
        </div>
      </div>

      <div class="alert alert-warning mb-4" id="login-setup-note" role="alert">
        Add your Supabase project URL and publishable key in <code>assets/js/supabase-config.js</code> before using login.
      </div>

      <form id="login-form" class="row g-3">
        <div class="col-12">
          <div class="alert alert-danger d-none mb-0" id="login-error" role="alert"></div>
        </div>
        <div class="col-12">
          <label class="form-label" for="login-email">Email</label>
          <input class="form-control" id="login-email" type="email" autocomplete="email" required>
        </div>
        <div class="col-12">
          <label class="form-label" for="login-password">Password</label>
          <input class="form-control" id="login-password" type="password" autocomplete="current-password" required>
        </div>
        <div class="col-12 d-grid">
          <button class="btn btn-dark" id="login-submit" type="submit">Sign in</button>
        </div>
      </form>

      <p class="text-secondary small mt-4 mb-0">For a two-person setup, create the two accounts in Supabase Auth and disable public sign-ups.</p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase-config.js?v=20260504"></script>
  <script src="assets/js/supabase-auth.js?v=20260504"></script>
  <script>
    (function () {
      var form = document.getElementById("login-form");
      var emailInput = document.getElementById("login-email");
      var passwordInput = document.getElementById("login-password");
      var errorElement = document.getElementById("login-error");
      var setupNote = document.getElementById("login-setup-note");
      var submitButton = document.getElementById("login-submit");
      var auth = window.familyCalendarAuth;

      function showError(message) {
        errorElement.textContent = message;
        errorElement.classList.remove("d-none");
      }

      function hideError() {
        errorElement.textContent = "";
        errorElement.classList.add("d-none");
      }

      if (!auth || !auth.isConfigured()) {
        submitButton.disabled = true;
        return;
      }

      setupNote.classList.add("d-none");

      auth.createClient().auth.getUser().then(function (result) {
        if (result.data && result.data.user) {
          window.location.href = (window.FAMILY_CALENDAR_SUPABASE && window.FAMILY_CALENDAR_SUPABASE.redirectPath) || "index.html";
        }
      });

      form.addEventListener("submit", async function (event) {
        event.preventDefault();
        hideError();
        submitButton.disabled = true;

        var supabaseClient = auth.createClient();
        var signInResult = await supabaseClient.auth.signInWithPassword({
          email: emailInput.value.trim(),
          password: passwordInput.value
        });

        submitButton.disabled = false;

        if (signInResult.error) {
          showError(signInResult.error.message || "Sign in failed.");
          return;
        }

        var params = new URLSearchParams(window.location.search);
        var nextPath = params.get("next") || ((window.FAMILY_CALENDAR_SUPABASE && window.FAMILY_CALENDAR_SUPABASE.redirectPath) || "index.html");
        window.location.href = nextPath;
      });
    })();
  </script>
</body>
</html>
