<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Family Calendar</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f5f7fb;
      color: #1f2937;
    }

    main {
      padding: 2rem;
      border-radius: 12px;
      background: #ffffff;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      text-align: center;
    }

    h1 {
      margin: 0 0 0.5rem;
      font-size: 2rem;
    }

    p {
      margin: 0;
      font-size: 1rem;
    }
  </style>
</head>
<body>
  <main>
    <h1>Hello, world!</h1>
    <p>Your Family Calendar site is live and ready to grow.</p>
  </main>
</body>
</html>
